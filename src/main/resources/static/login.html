<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — HelpDesk</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="card auth-card">
      <h1 class="auth-title">🎫 HelpDesk</h1>
      <p class="auth-subtitle">Sign in to your account</p>

      <div id="alert-box" class="alert alert-error"></div>

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter username" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()">
        Sign In
      </button>
      <p style="text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--gray-600)">
        Don't have an account? <a href="/register.html">Register</a>
      </p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    if (isLoggedIn()) window.location.href = '/dashboard.html';

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) return showAlert('alert-box', 'Please fill in all fields');
      try {
        const data = await apiPost('/auth/login', { username, password });
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify({ username: data.username, role: data.role }));
        window.location.href = '/dashboard.html';
      } catch (e) {
        showAlert('alert-box', 'Invalid username or password');
      }
    }

    document.addEventListener('keypress', e => { if (e.key === 'Enter') doLogin(); });
  </script>
</body>
</html>

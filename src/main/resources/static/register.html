<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — HelpDesk</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-wrapper">
    <div class="card auth-card">
      <h1 class="auth-title">🎫 HelpDesk</h1>
      <p class="auth-subtitle">Create your account</p>

      <div id="alert-box" class="alert alert-error"></div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Choose a username">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 6 characters">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doRegister()">
        Create Account
      </button>
      <p style="text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--gray-600)">
        Already have an account? <a href="/login.html">Sign in</a>
      </p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    async function doRegister() {
      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !email || !password) return showAlert('alert-box', 'Please fill in all fields');
      if (password.length < 6) return showAlert('alert-box', 'Password must be at least 6 characters');
      try {
        await apiPost('/auth/register', { username, email, password });
        showAlert('alert-box', 'Account created! Redirecting...', 'success');
        document.getElementById('alert-box').style.display = 'block';
        setTimeout(() => window.location.href = '/login.html', 1500);
      } catch (e) {
        showAlert('alert-box', e.message || 'Registration failed');
      }
    }
  </script>
</body>
</html>
